<!DOCTYPE html>
<html lang="ur">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fresh Store Alizeh | Dynamic Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #fafafa; color: #1a1a1a; scroll-behavior: smooth; }
        .font-playfair { font-family: 'Playfair Display', serif; }
        
        header { 
            position: fixed; top: 0; left: 0; width: 100%; z-index: 100; 
            background: rgba(255, 255, 255, 0.85); 
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(0, 0, 0, 0.05); 
            transition: all 0.3s ease;
        }

        /* WA Floating Menu Styling */
        .wa-float { position: fixed; bottom: 30px; right: 20px; z-index: 1000; }
        .wa-menu { 
            position: absolute; bottom: 75px; right: 0; width: 240px; 
            background: white; border-radius: 20px; box-shadow: 0 15px 45px rgba(0,0,0,0.15);
            display: none; flex-direction: column; overflow: hidden; border: 1px solid #f0f0f0;
        }
        .wa-menu.active { display: flex; animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
        .wa-menu a { padding: 16px 20px; font-size: 14px; font-weight: 700; border-bottom: 1px solid #f8f8f8; transition: all 0.3s; color: #374151; display: flex; align-items: center; gap: 10px; }
        .wa-menu a:hover { background: #fdf2f8; color: #ec4899; padding-left: 25px; }

        @keyframes slideUp { from { opacity: 0; transform: translateY(20px) scale(0.95); } to { opacity: 1; transform: translateY(0) scale(1); } }

        .product-card { 
            background: #ffffff; border-radius: 20px; border: 1px solid #f4f4f4; 
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1); 
            overflow: hidden; display: flex; flex-direction: column; 
        }
        .product-card:hover { transform: translateY(-8px); box-shadow: 0 20px 40px rgba(0,0,0,0.08); border-color: #fce7f3; }
        
        .btn-buy { background: linear-gradient(135deg, #111827 0%, #374151 100%); color: #fff; font-size: 11px; font-weight: 700; padding: 12px; border-radius: 10px; text-align: center; flex: 1; transition: all 0.3s; }
        .btn-buy:hover { background: linear-gradient(135deg, #ec4899 0%, #f43f5e 100%); transform: translateY(-2px); }
        
        .btn-wa { background: #25d366; color: #fff; font-size: 18px; padding: 10px 14px; border-radius: 10px; transition: all 0.3s; display: flex; align-items: center; justify-content: center; }
        .btn-wa:hover { background: #1ebd57; transform: translateY(-2px); }

        .category-link { cursor: pointer; font-size: 12px; text-transform: uppercase; color: #6b7280; font-weight: 700; padding: 10px 20px; white-space: nowrap; transition: all 0.3s; border-radius: 24px; background: white; border: 1px solid #eee; }
        .category-link.active { background: linear-gradient(135deg, #ec4899 0%, #f43f5e 100%); color: white; border: none; }

        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

    <!-- WhatsApp Floating Section -->
    <div class="wa-float">
        <div class="wa-menu" id="waMenu">
            <!-- Admin Data will load here -->
        </div>
        <button onclick="toggleWaMenu()" class="bg-gradient-to-r from-[#25d366] to-[#1ebd57] text-white w-16 h-16 rounded-full shadow-xl flex items-center justify-center text-3xl hover:-translate-y-1 active:scale-95 transition-all duration-300">
            <i class="fab fa-whatsapp"></i>
        </button>
    </div>

    <!-- Header & Navigation -->
    <header>
        <nav class="max-w-[1400px] mx-auto px-4 py-4 flex flex-col md:flex-row items-center justify-between gap-4">
            <div class="flex items-center justify-between w-full md:w-auto">
                <a href="index.html" class="logo font-playfair font-bold text-3xl tracking-tighter" id="display-logo">Loading...</a>
                <div class="md:hidden text-2xl text-gray-800"><i class="fas fa-shopping-bag"></i></div>
            </div>
            <div class="relative w-full md:max-w-[500px]">
                <input type="text" id="searchInput" placeholder="Search premium products..." class="w-full py-3 px-12 rounded-full border border-gray-200 bg-white text-sm outline-none focus:ring-2 ring-pink-400 transition-all">
                <i class="fas fa-search absolute left-5 top-3.5 text-gray-400"></i>
            </div>
        </nav>
    </header>

    <main class="max-w-[1400px] mx-auto px-4 pt-36 pb-12">
        <!-- Sliders -->
        <div class="hero-container rounded-[2rem] aspect-[16/8] md:aspect-[16/6] relative overflow-hidden bg-gray-100 mb-12 shadow-sm" id="slider-container"></div>

        <!-- Special Banner -->
        <div id="special-banner" class="hidden mb-16 bg-gradient-to-br from-slate-900 to-black rounded-[2.5rem] overflow-hidden flex flex-col md:flex-row items-center p-8 md:p-14 relative shadow-2xl">
            <div class="text-white z-10 w-full md:w-1/2">
                <h2 id="sp-title" class="text-4xl md:text-6xl font-bold mb-5 font-playfair"></h2>
                <p id="sp-desc" class="text-gray-300 text-base mb-8 max-w-md"></p>
                <a href="#" id="sp-link" class="inline-block bg-white text-black px-10 py-4 rounded-full font-bold uppercase text-xs tracking-widest hover:bg-pink-500 hover:text-white transition-all"></a>
            </div>
            <div class="w-full md:w-1/2 flex justify-center mt-10 md:mt-0 relative z-10">
                <img id="sp-img" src="" class="max-h-72 object-contain">
            </div>
        </div>

        <!-- Category Bar -->
        <div class="mb-10 flex gap-4 overflow-x-auto no-scrollbar py-2" id="category-bar">
            <span class="category-link active" onclick="setCategory('all')">All Items</span>
        </div>

        <!-- Products Grid -->
        <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-5 md:gap-8" id="product-grid"></div>
    </main>

    <!-- Footer -->
    <footer class="bg-gray-950 text-gray-400 py-16 px-6 mt-10 border-t border-gray-900">
        <div class="max-w-[1400px] mx-auto grid grid-cols-1 md:grid-cols-4 gap-12">
            <div>
                <h3 class="text-white font-playfair text-2xl mb-5 font-bold">Alizeh Fresh</h3>
                <p class="text-sm">Pakistan's premium affiliate store. Handpicked quality products just for you.</p>
            </div>
            <div class="flex flex-col items-start md:items-center">
                <h4 class="text-white font-bold mb-5 text-sm uppercase">Headquarters</h4>
                <p class="text-sm" id="footer-loc"><i class="fas fa-map-marker-alt mr-2 text-pink-500"></i> Loading...</p>
            </div>
            <div>
                <h4 class="text-white font-bold mb-5 text-sm uppercase">Support</h4>
                <p class="text-sm mb-2" id="footer-wa"></p>
            </div>
            <div>
                <h4 class="text-white font-bold mb-5 text-sm uppercase">Follow Us</h4>
                <div class="flex gap-5 text-white text-2xl">
                    <a href="#" id="footer-fb" target="_blank" class="hover:text-pink-500 transition-colors"><i class="fab fa-facebook-f"></i></a>
                    <a href="#" id="footer-ig" target="_blank" class="hover:text-pink-500 transition-colors"><i class="fab fa-instagram"></i></a>
                </div>
            </div>
        </div>
        <div class="max-w-[1400px] mx-auto mt-12 pt-8 border-t border-gray-900 text-center text-xs">
            &copy; 2026 Alizeh Fresh. Powerd by Muneer Bhai.
        </div>
    </footer>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot, query, orderBy, doc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBZsPnOhzr1CcjQMgV10Vwqx0GXCu40oO0",
            authDomain: "fresh-store-aliza.firebaseapp.com",
            projectId: "fresh-store-aliza",
            storageBucket: "fresh-store-aliza.firebasestorage.app",
            messagingSenderId: "609424223918",
            appId: "1:609424223918:web:9422fc5ea053a9e382473f"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let allProducts = [];
        let currentCat = 'all';
        let waNumber = "923106498157";

        window.toggleWaMenu = () => document.getElementById('waMenu').classList.toggle('active');

        // Settings (Logo, WhatsApp, Socials)
        onSnapshot(doc(db, "settings", "main"), d => {
            if(d.exists()){
                const s = d.data();
                waNumber = s.whatsapp || waNumber;
                document.getElementById('display-logo').innerHTML = `${s.logo || 'Alizeh'} <span class="font-normal text-pink-500">Fresh</span>`;
                
                const cleanNumber = waNumber.replace(/^\+/, '');
                document.getElementById('footer-wa').innerHTML = `<i class="fab fa-whatsapp mr-2 text-pink-500"></i> +${cleanNumber}`;
                document.getElementById('footer-loc').innerHTML = `<i class="fas fa-globe mr-2 text-pink-500"></i> ${s.location || "Hasilpur"}`;
                
                if(s.facebook) document.getElementById('footer-fb').href = s.facebook;
                if(s.instagram) document.getElementById('footer-ig').href = s.instagram;
            }
        });

        // FIXED: Dynamic WhatsApp Menu Logic
        // This now listens to the EXACT same collection as your Admin: "wa_menu"
        onSnapshot(query(collection(db, "wa_menu"), orderBy("date", "asc")), snap => {
            const menu = document.getElementById('waMenu');
            menu.innerHTML = ''; 
            
            // Default first 2 permanent links
            menu.innerHTML += `
                <a href="https://wa.me/${waNumber}?text=Assalam-o-Alaikum, I need help with an order." target="_blank">
                    <i class="fas fa-shopping-cart text-green-500"></i> Order Help
                </a>
                <a href="https://wa.me/${waNumber}?text=Assalam-o-Alaikum, I want to know about your products." target="_blank">
                    <i class="fas fa-info-circle text-blue-500"></i> Product Info
                </a>`;

            // Admin Added Dynamic Links
            snap.forEach(docSnap => {
                const link = docSnap.data();
                const msg = encodeURIComponent(link.text || "Hello");
                const label = link.label || "Support";
                
                menu.innerHTML += `
                    <a href="https://wa.me/${waNumber}?text=${msg}" target="_blank">
                        <i class="fas fa-star text-pink-500"></i> ${label}
                    </a>`;
            });
        });

        // Special Banner
        onSnapshot(doc(db, "settings", "special"), d => {
            if(d.exists()){
                const sp = d.data();
                document.getElementById('special-banner').classList.remove('hidden');
                document.getElementById('sp-title').innerText = sp.title;
                document.getElementById('sp-desc').innerText = sp.desc;
                document.getElementById('sp-img').src = sp.image;
                document.getElementById('sp-link').innerText = sp.btnText;
                document.getElementById('sp-link').href = sp.link;
            }
        });

        // Categories
        onSnapshot(query(collection(db, "categories"), orderBy("date", "desc")), snap => {
            const bar = document.getElementById('category-bar');
            bar.innerHTML = `<span class="category-link ${currentCat==='all'?'active':''}" onclick="setCategory('all')">All Items</span>`;
            snap.forEach(docSnap => {
                const c = docSnap.data();
                bar.innerHTML += `<span class="category-link ${currentCat===c.name?'active':''}" onclick="setCategory('${c.name}')">${c.name}</span>`;
            });
        });

        window.setCategory = (cat) => {
            currentCat = cat;
            renderProducts(currentCat === 'all' ? allProducts : allProducts.filter(p => p.category === currentCat));
            const links = document.querySelectorAll('.category-link');
            links.forEach(l => l.classList.remove('active'));
            event.target.classList.add('active');
        };

        // Products
        onSnapshot(query(collection(db, "products"), orderBy("date", "desc")), (snap) => {
            allProducts = [];
            snap.forEach(docSnap => {
                const data = docSnap.data();
                data.id = docSnap.id;
                allProducts.push(data);
            });
            renderProducts(allProducts);
        });

        function renderProducts(products) {
            const grid = document.getElementById('product-grid');
            grid.innerHTML = '';
            const urlParams = new URLSearchParams(window.location.search);
            const targetId = urlParams.get('id');

            products.forEach(p => {
                const msg = encodeURIComponent(`Inquiry about: ${p.name}\nPrice: Rs. ${p.price}`);
                const isHighlighted = targetId && p.id === targetId;

                grid.innerHTML += `
                <div id="prod-${p.id}" class="product-card group p-5 ${isHighlighted ? 'ring-4 ring-pink-500 scale-105 shadow-2xl' : ''}">
                    <div class="h-44 flex items-center justify-center mb-5 overflow-hidden rounded-xl bg-gray-50">
                        <img src="${p.image}" class="max-h-full p-2 object-contain mix-blend-multiply transition-transform duration-500 group-hover:scale-110">
                    </div>
                    <div class="flex-grow flex flex-col justify-end">
                        <h3 class="text-sm font-bold text-gray-800 leading-tight mb-2 line-clamp-2">${p.name}</h3>
                        <p class="text-pink-600 font-bold text-lg mb-5">Rs. ${p.price}</p>
                        <div class="flex gap-3">
                            <a href="${p.link}" target="_blank" class="btn-buy">BUY NOW</a>
                            <a href="https://wa.me/${waNumber}?text=${msg}" target="_blank" class="btn-wa"><i class="fab fa-whatsapp"></i></a>
                        </div>
                    </div>
                </div>`;
            });

            if(targetId) {
                setTimeout(() => {
                    const el = document.getElementById('prod-' + targetId);
                    if(el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
                }, 1000);
            }
        }

        // Search
        document.getElementById('searchInput').oninput = (e) => {
            const term = e.target.value.toLowerCase();
            renderProducts(allProducts.filter(p => p.name.toLowerCase().includes(term)));
        };

        // Sliders
        onSnapshot(collection(db, "sliders"), snap => {
            const cont = document.getElementById('slider-container');
            cont.innerHTML = '';
            snap.forEach(docSnap => {
                const s = docSnap.data();
                cont.innerHTML += `<div class="slider-box absolute inset-0 opacity-0 transition-opacity duration-1000 w-full h-full">
                    <img src="${s.bgImg}" class="w-full h-full object-cover">
                    <div class="absolute inset-0 bg-gradient-to-r from-black/80 to-transparent flex items-center px-10 md:px-20">
                        <div class="text-white max-w-lg transform translate-y-4 transition-transform duration-1000 slide-content">
                            <h2 class="text-4xl md:text-6xl font-bold mb-6 font-playfair leading-tight">${s.title}</h2>
                            <a href="${s.link}" class="inline-block bg-white text-black px-8 py-3 rounded-full font-bold text-sm uppercase tracking-widest hover:bg-pink-500 hover:text-white transition-all duration-300 shadow-lg">Shop Now</a>
                        </div>
                    </div>
                </div>`;
            });
            initSlider();
        });

        function initSlider() {
            let i = 0; const slides = document.querySelectorAll('.slider-box');
            if(!slides.length) return;
            const run = () => { 
                slides.forEach(s => {
                    s.style.opacity = 0;
                    const content = s.querySelector('.slide-content');
                    if(content) content.style.transform = 'translateY(20px)';
                }); 
                slides[i].style.opacity = 1; 
                const activeContent = slides[i].querySelector('.slide-content');
                if(activeContent) activeContent.style.transform = 'translateY(0)';
                i = (i + 1) % slides.length; 
            };
            run(); 
            if(window.sliderInterval) clearInterval(window.sliderInterval);
            window.sliderInterval = setInterval(run, 5000);
        }
    </script>
</body>
</html>
